<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>
  <!-- Rotated square -->
  <rect x="10" y="10" width="16" height="16" rx="2" ry="2"
    fill="white" fill-opacity="0.55"
    stroke="white" stroke-width="1" stroke-opacity="0.7"
    transform="rotate(45, 16, 18)"/>
  <!-- Circle -->
  <circle cx="13" cy="14" r="8"
    fill="white" fill-opacity="0.9"
    stroke="white" stroke-width="1"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shapeA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="shapeB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#312e81" flood-opacity="0.35"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full bleed background — no rounded corners for maskable safe zone -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- Safe zone content centered in 80% = 409px, starting at 51px -->
  <g transform="translate(51, 51) scale(0.8)">
    <!-- Grid dots -->
    <g opacity="0.15">
      <circle cx="128" cy="128" r="8" fill="white"/>
      <circle cx="256" cy="128" r="8" fill="white"/>
      <circle cx="384" cy="128" r="8" fill="white"/>
      <circle cx="128" cy="256" r="8" fill="white"/>
      <circle cx="384" cy="256" r="8" fill="white"/>
      <circle cx="128" cy="384" r="8" fill="white"/>
      <circle cx="256" cy="384" r="8" fill="white"/>
      <circle cx="384" cy="384" r="8" fill="white"/>
    </g>
    <!-- Rotated square -->
    <rect x="176" y="176" width="240" height="240" rx="20" ry="20"
      fill="url(#shapeB)" stroke="white" stroke-width="8" stroke-opacity="0.6"
      transform="rotate(45, 256, 296)" filter="url(#shadow)"/>
    <!-- Circle -->
    <circle cx="220" cy="216" r="118"
      fill="url(#shapeA)" stroke="white" stroke-width="8" stroke-opacity="0.9"
      filter="url(#glow)"/>
    <!-- Intersection -->
    <circle cx="268" cy="258" r="28" fill="white" opacity="0.45"/>
  </g>
</svg>
